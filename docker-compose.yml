version: '3.8'

services:
  synapse-db:
    image: postgres:15-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: gizli_veritabanı_sifresi
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ./synapse_data:/data
    environment:
      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
    depends_on:
      - synapse-db

  cinny:
    image: ajbura/cinny:latest
    container_name: matrix-cinny
    restart: unless-stopped
    ports:
      - "8080:80"

  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    restart: unless-stopped
    volumes:
      - ./whatsapp-data:/data
    environment:
      - UID=1000
      - GID=1000
    depends_on:
      - synapse

  # --- YENİ EKLENEN SERVİSLER (Mesaj Kayıt Altyapısı) ---

  mongodb:
    image: mongo:6.0
    container_name: matrix-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: matrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data  